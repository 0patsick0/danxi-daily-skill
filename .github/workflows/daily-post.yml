name: DanXi Daily Auto Post

permissions:
  contents: read

on:
  schedule:
    # 23:30 China Standard Time (UTC+8) = 15:30 UTC
    - cron: "30 15 * * *"
  workflow_dispatch:

jobs:
  auto-post:
    if: ${{ github.ref_name == github.event.repository.default_branch }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: danxi-daily-auto-post
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate and post daily report
        env:
          TZ: Asia/Shanghai
          DANXI_API_TOKEN: ${{ secrets.DANXI_API_TOKEN }}
          DANXI_POST_ENDPOINT: ${{ secrets.DANXI_POST_ENDPOINT }}
          DANXI_POST_TOKEN: ${{ secrets.DANXI_POST_TOKEN }}
          DANXI_WEBVPN_USERNAME: ${{ secrets.DANXI_WEBVPN_USERNAME }}
          DANXI_WEBVPN_PASSWORD: ${{ secrets.DANXI_WEBVPN_PASSWORD }}
          DANXI_WEBVPN_MODE: auto
          DANXI_ARCHIVE_OUTPUTS: "false"
        run: |
          if [ -z "$DANXI_POST_ENDPOINT" ] || [ -z "$DANXI_POST_TOKEN" ]; then
            echo "::error::Missing required secrets: DANXI_POST_ENDPOINT or DANXI_POST_TOKEN"
            exit 1
          fi

          python scripts/generate_daily.py \
            --hours 24 \
            --top 12 \
            --webvpn-no-prompt \
            --post \
            --post-endpoint "$DANXI_POST_ENDPOINT" \
            --post-at 23:30

      - name: Upload generated report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: danxi-daily-report
          path: |
            outputs/daily.md
            outputs/ranked.json
            outputs/holes.raw.json
          if-no-files-found: warn
